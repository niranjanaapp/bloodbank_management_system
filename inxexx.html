<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Blood Donation</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header>
        <h1>Save Lives — Donate Blood ❤️</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#donate">Become Donor</a>
            <a href="#request">Request Blood</a>
        </nav>
    </header>

    <section id="home" class="hero">
        <h2>Your single act can save many lives</h2>
        <p>“Every drop counts — be someone’s hero today!”</p>
    </section>

    <section id="donate" class="form-section">
        <h2>Register as Donor</h2>
        <form id="donorForm">
            <input type="text" placeholder="Full Name" required /><br />
            <input type="text" placeholder="Blood Group" required /><br />
            <input type="text" placeholder="Phone" required /><br />
            <button type="submit">Submit</button>
        </form>
    </section>

    <section id="request" class="form-section">
        <h2>Request Blood</h2>
        <form id="requestForm">
            <input type="text" placeholder="Patient Name" required /><br />
            <input type="text" placeholder="Blood Group" required /><br />
            <input type="text" placeholder="Phone" required /><br />
            <button type="submit">Submit</button>
        </form>
    </section>

    <footer>
        © 2026 Blood Donation Portal
    </footer>

    <script>
        document.getElementById("donorForm").addEventListener("submit", e => {
            e.preventDefault();
            alert("Donor Registered Successfully!");
        });

        document.getElementById("requestForm").addEventListener("submit", e => {
            e.preventDefault();
            alert("Blood Request Submitted!");
        });
    </script>

</body>
</html>
